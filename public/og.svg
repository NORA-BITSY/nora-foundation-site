  <text x="80" y="280" font-family="Georgia, serif" font-size="76" font-weight="700" fill="#0f0f0e">Verifiable reasoning.</text>
  <text x="80" y="370" font-family="Georgia, serif" font-size="76" font-weight="700" fill="#8C1515">Public infrastructure.</text>
  <text x="80" y="470" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#525250">Canon — the public standard for attestations any recipient</text>
